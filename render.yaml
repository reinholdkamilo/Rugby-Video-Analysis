databases:
  - name: rugby-video-analysis-db
    databaseName: rugby_video_analysis
    user: rugby_video_analysis

services:
  - type: web
    name: rugby-video-analysis-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: video-storage
      mountPath: /var/data/uploads
      sizeGB: 20
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rugby-video-analysis-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_BYTES
        value: "5368709120"
