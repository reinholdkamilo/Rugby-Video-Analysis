databases:
  - name: rugby-video-analysis-db
    databaseName: rugby_video_analysis
    user: rugby_video_analysis
    region: singapore
    plan: basic-256mb

services:
  - type: web
    name: rugby-video-analysis-api
    runtime: docker
    region: singapore
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/system/ready
    autoDeploy: true
    disk:
      name: video-storage
      mountPath: /var/data
      sizeGB: 20
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rugby-video-analysis-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: UPLOAD_SESSION_DIR
        value: /var/data/upload_sessions
      - key: THUMBNAIL_DIR
        value: /var/data/thumbnails
      - key: CLIP_DIR
        value: /var/data/clips
      - key: VISION_FRAME_DIR
        value: /var/data/vision_frames
      - key: ENABLE_EMBEDDED_WORKER
        value: "true"
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "3"
      - key: MAX_UPLOAD_BYTES
        value: "5368709120"
      - key: MAX_CHUNK_BYTES
        value: "8388608"
