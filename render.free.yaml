services:
  - type: web
    name: rugby-video-analysis-api-free
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: staging
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_EMBEDDED_WORKER
        value: "true"
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "5"
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
      - key: MAX_CHUNK_BYTES
        value: "4194304"
      - key: UPLOAD_DIR
        value: /tmp/rugby-video-analysis/uploads
      - key: UPLOAD_SESSION_DIR
        value: /tmp/rugby-video-analysis/upload_sessions
      - key: THUMBNAIL_DIR
        value: /tmp/rugby-video-analysis/thumbnails
      - key: CLIP_DIR
        value: /tmp/rugby-video-analysis/clips
      - key: VISION_FRAME_DIR
        value: /tmp/rugby-video-analysis/vision_frames
