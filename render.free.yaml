services:
  - type: web
    name: rugby-video-analysis-api-free
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/system/ready
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: staging
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_EMBEDDED_WORKER
        value: "false"
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "5"
      - key: MAX_CONCURRENT_HEAVY_JOBS
        value: "1"
      - key: FFMPEG_THREADS
        value: "1"
      - key: HOSTED_MAX_LOCAL_UPLOAD_BYTES
        value: "262144000"
      - key: HOSTED_MAX_PROCESSING_VIDEO_BYTES
        value: "786432000"
      - key: MAX_UPLOAD_BYTES
        value: "5368709120"
      - key: MAX_CHUNK_BYTES
        value: "4194304"
      - key: MULTIPART_PART_SIZE_BYTES
        value: "16777216"
      - key: UPLOAD_DIR
        value: /tmp/rugby-video-analysis/uploads
      - key: UPLOAD_SESSION_DIR
        value: /tmp/rugby-video-analysis/upload_sessions
      - key: THUMBNAIL_DIR
        value: /tmp/rugby-video-analysis/thumbnails
      - key: CLIP_DIR
        value: /tmp/rugby-video-analysis/clips
      - key: VISION_FRAME_DIR
        value: /tmp/rugby-video-analysis/vision_frames
      - key: OBJECT_CACHE_DIR
        value: /tmp/rugby-video-analysis/object_cache
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_PRESIGNED_URL_SECONDS
        value: "3600"
