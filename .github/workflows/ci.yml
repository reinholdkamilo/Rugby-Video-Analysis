name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run lint
      - run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install FFmpeg and application dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          cd frontend
          npm install
      - name: Start backend
        run: |
          source .venv/bin/activate
          cd backend
          ENABLE_EMBEDDED_WORKER=true uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
      - name: Start frontend proxy
        run: |
          cd frontend
          BACKEND_INTERNAL_URL=http://127.0.0.1:8000 npm run dev > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
      - name: Wait for application
        run: |
          for _ in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:3000/backend/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend log:"
          cat /tmp/backend.log || true
          echo "Frontend log:"
          cat /tmp/frontend.log || true
          exit 1
      - name: Run end-to-end smoke test
        run: bash scripts/smoke-test.sh
      - name: Show logs after failure
        if: failure()
        run: |
          echo "Backend log:"
          cat /tmp/backend.log || true
          echo "Frontend log:"
          cat /tmp/frontend.log || true
