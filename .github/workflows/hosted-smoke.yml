name: Hosted Phase 1 Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * 1"

concurrency:
  group: hosted-phase-1-smoke
  cancel-in-progress: true

jobs:
  hosted-smoke:
    name: Verify hosted Phase 1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FRONTEND_URL: https://rugby-video-analysis.vercel.app
      BACKEND_URL: https://rugby-video-analysis-api-free.onrender.com
    steps:
      - name: Wake free backend and wait for readiness
        run: |
          for attempt in $(seq 1 30); do
            echo "Readiness attempt ${attempt}/30"
            if curl --silent --show-error --fail --max-time 30 "${BACKEND_URL}/api/system/ready" | tee /tmp/readiness.json; then
              exit 0
            fi
            sleep 10
          done
          exit 1
      - name: Verify frontend routes and backend proxy
        run: |
          routes=("/" "/catalog" "/coding" "/timeline" "/suggestions" "/understanding" "/intelligence" "/system")
          for route in "${routes[@]}"; do
            echo "Checking ${FRONTEND_URL}${route}"
            curl --silent --show-error --fail --location --max-time 30 "${FRONTEND_URL}${route}" >/dev/null
          done
          curl --silent --show-error --fail --location --max-time 30 "${FRONTEND_URL}/backend/health" | tee /tmp/proxy-health.json
          curl --silent --show-error --fail --location --max-time 30 "${FRONTEND_URL}/backend/api/system/ready" | tee /tmp/proxy-readiness.json
      - name: Verify core read APIs
        run: |
          endpoints=(
            "/api/organisations"
            "/api/teams"
            "/api/matches"
            "/api/analysis-jobs"
            "/api/timeline-events"
          )
          for endpoint in "${endpoints[@]}"; do
            echo "Checking ${BACKEND_URL}${endpoint}"
            curl --silent --show-error --fail --max-time 30 "${BACKEND_URL}${endpoint}" >/dev/null
          done
