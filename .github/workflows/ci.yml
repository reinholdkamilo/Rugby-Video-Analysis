name: Continuous Integration

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
        working-directory: .
      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: ruff check app tests
      - name: Pytest
        env:
          ENABLE_EMBEDDED_WORKER: "false"
          DATABASE_URL: sqlite:///./ci_test.db
        run: |
          pytest -q --maxfail=1 > /tmp/pytest.log 2>&1 || {
            tail -200 /tmp/pytest.log
            exit 1
          }
          cat /tmp/pytest.log

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm install
      - name: Lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tail -120
      - name: Production build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: npm run build

  smoke-test:
    name: Application smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install application dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m venv .venv
          .venv/bin/pip install -r backend/requirements.txt -r backend/requirements-dev.txt
          cd frontend
          npm install
      - name: Start backend
        run: |
          cd backend
          ENABLE_EMBEDDED_WORKER=false DATABASE_URL=sqlite:///./smoke_test.db ../.venv/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
      - name: Start frontend proxy
        run: |
          cd frontend
          BACKEND_INTERNAL_URL=http://127.0.0.1:8000 npm run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
      - name: Wait for application
        run: |
          for _ in $(seq 1 60); do
            if curl --silent --fail --max-time 3 http://127.0.0.1:3000/backend/health >/dev/null && \
               curl --silent --fail --max-time 3 http://127.0.0.1:3000/backend/api/system >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/backend.log || true
          cat /tmp/frontend.log || true
          exit 1
      - name: Run end-to-end smoke test
        run: bash scripts/smoke-test.sh
      - name: Show logs after failure
        if: failure()
        run: |
          cat /tmp/backend.log || true
          cat /tmp/frontend.log || true
